name: Deploy Pupilens Landing Page

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload Pupilens to DreamHost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: FTP Deploy Pupilens
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /home/USUARIO_FTP/DOMINIO_PUPILENS/pupilens_LP/
          local-dir: ./
          protocol: ftp
          port: 21